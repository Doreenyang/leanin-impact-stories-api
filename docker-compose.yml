version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://leanin:leanin123@db:5432/leanin_impact
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=leanin
      - POSTGRES_PASSWORD=leanin123
      - POSTGRES_DB=leanin_impact
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanin -d leanin_impact"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
